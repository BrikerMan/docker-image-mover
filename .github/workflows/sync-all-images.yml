name: Sync All Docker Images

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync all images'
        type: boolean
        default: false
        required: false

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}

jobs:
  mirror-all-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to target registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Process and sync images
        run: |
          chmod +x scripts/transform-image.sh

          FAILED=()
          TOTAL=0

          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] && continue
            [[ $line =~ ^[[:space:]]*# ]] && continue

            TOTAL=$((TOTAL + 1))
            echo "========================================="
            echo "  Processing (${TOTAL}): ${line}"
            echo "========================================="

            if ./scripts/transform-image.sh "$line"; then
              echo "✅ Synced: ${line}"
            else
              echo "::warning::Failed to sync: ${line}"
              FAILED+=("$line")
            fi

            echo "Cleaning up Docker space..."
            docker system prune -af --volumes
          done < config/target-images.txt

          echo ""
          echo "========================================="
          echo "  Summary: $((TOTAL - ${#FAILED[@]}))/${TOTAL} synced, ${#FAILED[@]} failed"
          echo "========================================="

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::${#FAILED[@]} image(s) failed to sync:"
            for f in "${FAILED[@]}"; do
              echo "  ❌ $f"
            done
            exit 1
          fi

          echo "✅ All images synced successfully."

      - name: Upload mapping logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-mappings
          path: logs/image-mappings.json
          retention-days: 7
