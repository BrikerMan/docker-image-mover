name: Sync Single Docker Image

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: 'Source image (e.g. nginx:alpine or pgvector/pgvector:pg18)'
        required: true
        type: string

env:
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}

jobs:
  mirror-single-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to target registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Transform and push image
        run: |
          chmod +x scripts/transform-image.sh
          ./scripts/transform-image.sh "${{ inputs.source_image }}"

      - name: Upload mapping logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-mappings
          path: logs/image-mappings.json
          retention-days: 7
